  {type:"clean", id:47, name:"尿垫", price:15, food:0, happy:6, health:17},
  {type:"clean", id:48, name:"消毒液", price:17, food:0, happy:5, health:24},
  {type:"clean", id:49, name:"美容套装", price:28, food:0, happy:15, health:35},
  {type:"clean", id:50, name:"SPA护理", price:35, food:0, happy:20, health:40}
];

// 登录
async function login() {
  const email = document.getElementById("email").value.trim();
  const pwd = document.getElementById("pwd").value.trim();
  try {
    const { data, error } = await supabase.auth.signInWithPassword({ email, password: pwd });
    if (error) throw error;
    currentUser = data.user;
    await loadUserRole();
  } catch (e) {
    alert("登录失败：" + e.message);
  }
}

// 注册
async function register() {
  const email = document.getElementById("email").value.trim();
  const pwd = document.getElementById("pwd").value.trim();
  const role = document.getElementById("role-select").value;
  try {
    const { data, error } = await supabase.auth.signUp({ email, password: pwd });
    if (error) throw error;
    await supabase.from("users").insert([{ id: data.user.id, role, points: role === "student" ? 20 : 0, pets: [] }]);
    alert("注册成功！请登录");
  } catch (e) {
    alert("注册失败：" + e.message);
  }
}

// 选宠物
async function selectPet(petId) {
  const pet = pets.find(p => p.id === petId);
  const { data } = await supabase.from("users").select("pets").eq("id", currentUser.id).single();
  const newPets = [...data.pets, { id: petId, icon: pet.icon, name: pet.name, food: 50, happy: 50, health: 50 }];
  await supabase.from("users").update({ pets: newPets }).eq("id", currentUser.id);
  loadPets();
  showScreen("student-main");
}

// 加载宠物
async function loadPets() {
  const uid = userRole === "student" ? currentUser.id : studentUid;
  const { data } = await supabase.from("users").select("points, pets").eq("id", uid).single();
  document.getElementById("points").innerText = "积分：" + data.points;
  if (!data.pets.length) {
    showScreen("select-pet-screen");
    return;
  }
  currentPet = data.pets[0];
  renderPet();
}

function renderPet() {
  document.getElementById("pet-icon").innerText = currentPet.icon;
  document.getElementById("pet-name").innerText = currentPet.name;
  document.getElementById("food-val").innerText = currentPet.food;
  document.getElementById("happy-val").innerText = currentPet.happy;
  document.getElementById("health-val").innerText = currentPet.health;
  document.getElementById("food-bar").style.width = currentPet.food + "%";
  document.getElementById("happy-bar").style.width = currentPet.happy + "%";
  document.getElementById("health-bar").style.width = currentPet.health + "%";
}

// 互动
async function playPet() {
  currentPet.happy = Math.min(100, currentPet.happy + 5);
  await updatePet();
  confetti();
}
async function cleanPet() {
  currentPet.health = Math.min(100, currentPet.health + 8);
  await updatePet();
}

async function updatePet() {
  const uid = userRole === "student" ? currentUser.id : studentUid;
  const { data } = await supabase.from("users").select("pets").eq("id", uid).single();
  const index = data.pets.findIndex(p => p.id === currentPet.id);
  data.pets[index] = currentPet;
  await supabase.from("users").update({ pets: data.pets }).eq("id", uid);
  loadPets();
}

// 使用物品
async function useItem(item) {
  const uid = userRole === "student" ? currentUser.id : studentUid;
  const { data } = await supabase.from("users").select("points").eq("id", uid).single();
  if (data.points < item.price) {
    alert("积分不足！");
    return;
  }
  currentPet.food = Math.min(100, currentPet.food + item.food);
  currentPet.happy = Math.min(100, currentPet.happy + item.happy);
  currentPet.health = Math.min(100, currentPet.health + item.health);
  await supabase.from("users").update({ points: data.points - item.price }).eq("id", uid);
  await updatePet();
  confetti();
}

// 作业
async function submitHomework() {
  const content = document.getElementById("homework-content").value.trim();
  if (!content) {
    alert("请输入作业内容");
    return;
  }
  await supabase.from("homeworks").insert([{ uid: currentUser.id, content, status: "pending" }]);
  document.getElementById("homework-content").value = "";
  alert("提交成功！等待家长审核");
}

// 家长加载作业
async function loadHomeworks() {
  const el = document.getElementById("homework-list");
  el.innerHTML = "";
  const { data } = await supabase.from("homeworks").select("*").eq("status", "pending").order("created_at", { ascending: false });
  data.forEach(h => {
    el.innerHTML += `<div class='card-cute p-3 mb-2 bg-white'><p>${h.content}</p><p class='text-xs text-gray-400'>${new Date(h.created_at).toLocaleString()}</p><div class='flex gap-2 mt-2'><button onclick='passHomework(${h.id},"${h.uid}")' class='btn-cute bg-green-500 px-3 py-1 text-white text-sm'>通过 +10分</button><button onclick='rejectHomework(${h.id})' class='btn-cute bg-red-500 px-3 py-1 text-white text-sm'>驳回</button></div></div>`;
  });
}

// 审核
async function passHomework(id, uid) {
  await supabase.from("homeworks").update({ status: "pass" }).eq("id", id);
  const { data } = await supabase.from("users").select("points").eq("id", uid).single();
  await supabase.from("users").update({ points: data.points + 10 }).eq("id", uid);
  alert("审核通过！已发放10积分");
  loadHomeworks();
}
async function rejectHomework(id) {
  await supabase.from("homeworks").update({ status: "reject" }).eq("id", id);
  alert("已驳回");
  loadHomeworks();
}

// 界面切换
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(e => e.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

async function loadUserRole() {
  const { data } = await supabase.from("users").select("role").eq("id", currentUser.id).single();
  userRole = data.role;
  if (userRole === "parent") {
    studentUid = currentUser.id;
    showScreen("parent-main");
    loadHomeworks();
  } else {
    showScreen("student-main");
    loadPets();
  }
}

// 监听登录状态变化
supabase.auth.onAuthStateChange(async (e, session) => {
  if (!session) {
    currentUser = null;
    showScreen("login-screen");
    return;
  }
  currentUser = session.user;
  await loadUserRole();
});
</script>
</head>
<body class="pb-24">
<div class="max-w-md mx-auto p-4">
  <!-- 登录界面 -->

      <input id="pwd" type="password" placeholder="密码" class="w-full p-3 border rounded-full mb-3">
      <select id="role-select" class="w-full p-3 border rounded-full mb-3">
        <option value="student">我是小学生</option>
        <option value="parent">我是家长</option>
      </select>
      <button onclick="register()" class="btn-cute w-full bg-blue-500 text-white p-3 mb-2">注册</button>
      <button onclick="login()" class="btn-cute w-full bg-green-500 text-white p-3">登录</button>
    </div>
  </div>

  <!-- 选宠物界面 -->
  <div id="select-pet-screen" class="screen hidden p-4 card-cute bg-white mt-5">
    <h3 class="font-bold mb-3">选择你的第一只宠物</h3>

      <script>pets.forEach(p => document.write(`<button onclick="selectPet(${p.id})" class="text-3xl p-2 rounded hover:bg-gray-100">${p.icon}</button>`));</script>
    </div>
  </div>

  <!-- 学生主界面 -->
  <div id="student-main" class="screen hidden p-4">
    <div class="flex justify-between mb-3">
      <h2 class="font-bold">🐾 我的宠物</h2>
      <span id="points" class="text-yellow-600 font-bold">积分：0</span>
    </div>
    <div class="card-cute bg-white p-4 mb-3">
      <div class="flex justify-between"><span>🍚 饱食度</span><span id="food-val">50</span></div>
      <div class="w-full bg-gray-200 h-2 rounded-full my-1"><div id="food-bar" class="bg-orange-400 h-2 rounded-full" style="width:50%"></div></div>
      <div class="flex justify-between"><span>😊 开心度</span><span id="happy-val">50</span></div>
      <div class="w-full bg-gray-200 h-2 rounded-full my-1"><div id="happy-bar" class="bg-pink-400 h-2 rounded-full" style="width:50%"></div></div>
      <div class="flex justify-between"><span>💚 健康度</span><span id="health-val">50</span></div>
      <div class="w-full bg-gray-200 h-2 rounded-full my-1"><div id="health-bar" class="bg-green-400 h-2 rounded-full" style="width:50%"></div></div>
    </div>
    <div id="pet-icon" class="text-center text-6xl my-4 pet-bounce">🐶</div>
    <div class="text-center font-bold mb-4" id="pet-name">小狗</div>
    <div class="grid grid-cols-3 gap-2 mb-4">
      <button onclick="playPet()" class="btn-cute bg-pink-400 text-white p-3">逗宠物</button>
      <button onclick="cleanPet()" class="btn-cute bg-blue-400 text-white p-3">洗澡梳毛</button>
      <button onclick="showScreen('shop-screen')" class="btn-cute bg-yellow-400 text-white p-3">商店</button>
    </div>
    <button onclick="showScreen('homework-screen')" class="btn-cute w-full bg-green-500 text-white p-3">📝 作业打卡</button>
  </div>

  <!-- 商店界面 -->
  <div id="shop-screen" class="screen hidden p-4 card-cute bg-white">
    <h3 class="font-bold mb-2">🎁 积分商店</h3>
    <div class="grid grid-cols-2 gap-2 max-h-96 overflow-y-auto pb-5">
      <script>items.forEach(i=>{document.write(`<div class='p-2 border rounded'><div>${i.name}</div><div class='text-yellow-600'>💰${i.price}</div><button onclick="useItem(items[${i.id-1}])" class='btn-cute bg-green-500 text-white text-xs px-2 py-1 mt-1'>使用</button></div>`);});</script>
    </div>
    <button onclick="showScreen('student-main')" class="btn-cute w-full bg-gray-500 text-white p-2 mt-3">返回</button>
  </div>

  <!-- 作业提交界面 -->
  <div id="homework-screen" class="screen hidden p-4 card-cute bg-white">
    <h3 class="font-bold mb-2">📝 提交作业</h3>
    <textarea id="homework-content" class="w-full border rounded p-2 h-24 mb-2" placeholder="输入作业内容"></textarea>
    <button onclick="submitHomework()" class="btn-cute w-full bg-green-500 text-white p-3">提交审核</button>
    <button onclick="showScreen('student-main')" class="btn-cute w-full bg-gray-400 text-white p-2 mt-2">返回</button>
  </div>

  <!-- 家长审核界面 -->
  <div id="parent-main" class="screen hidden p-4 card-cute bg-white">
    <h2 class="font-bold mb-3">👨‍👩‍👧 家长审核中心</h2>
    <div id="homework-list"></div>
  </div>
</div>
</body>
</html>
